spring.application.name=RapidQuake

# All runtime settings for this app live in this file (tests use src/test/resources/application.properties + H2).

# ========== MySQL (still "Access denied"? Run db/mysql-workbench-setup.sql as root — whole file) ==========
# Use UTF-8 here (Java charset). MySQL schema can still be utf8mb4 — see db/mysql-workbench-setup.sql
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/rapidquake?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=rapidquake
spring.datasource.password=rapidquake
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Last-resort local dev only: comment out rapidquake username/password above, uncomment root below (your root password).
# spring.datasource.username=root
# spring.datasource.password=YOUR_ROOT_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
spring.flyway.enabled=false

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

# Seeded admin (first startup). Admin UI: /admin/login
rapidquake.admin.email=admin@rapidquake.local
rapidquake.admin.password=admin123
rapidquake.seed.admin.enabled=false

# Profile photos: stored under static/img/profile, served at /img/profile/<filename>
rapidquake.upload.dir=src/main/resources/static/img/profile

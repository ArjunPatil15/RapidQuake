<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="Layout(content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Admin | RapidQuake'">Admin | RapidQuake</title>
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}">
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>

<body class="admin-body">
<nav class="navbar navbar-expand-lg navbar-dark admin-navbar mb-3">
    <div class="container-fluid px-3 px-md-4 px-xl-5">
        <a class="navbar-brand" href="/admin/dashboard"><i class="fa-solid fa-shield-halved me-2"></i>RapidQuake Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeNav == 'dashboard'} ? ' active'" href="/admin/dashboard">
                        <i class="fa-solid fa-gauge-high me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeNav == 'users'} ? ' active'" href="/admin/users">
                        <i class="fa-solid fa-users me-1"></i>Registered users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activeNav == 'trapped'} ? ' active'" href="/admin/trapped">
                        <i class="fa-solid fa-person-falling me-1"></i>Trapped users</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fa-solid fa-house me-1"></i>Public site</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-link nav-link text-warning">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="admin-shell px-3 px-md-4 px-xl-5 pb-5 pt-2">
    <div th:replace="${content}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
<script th:src="@{/js/admin/admin.js}"></script>
</body>
</html>

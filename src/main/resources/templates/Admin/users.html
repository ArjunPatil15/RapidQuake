<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>

<body>
<section>
    <header class="admin-page-header">
        <h1><i class="fa-solid fa-users me-2"></i>Registered users</h1>
        <p class="admin-lead">Card view with quick profile access. Search users by name, then open details to edit, deactivate, or delete.</p>
    </header>

    <div class="admin-card p-3 p-md-4 mb-4">
        <div class="row g-3 align-items-center">
            <div class="col-12 col-md-8 col-lg-6">
                <label for="adminUserSearch" class="form-label text-light mb-1">Search by user name</label>
                <input id="adminUserSearch" type="text" class="form-control form-control-admin"
                       placeholder="Type a name (ex: Arjun)">
            </div>
            <div class="col-12 col-md-4 col-lg-3">
                <div class="admin-search-meta mt-md-4" id="adminUserResultCount"
                     th:text="${#lists.size(users)} + ' users'">0 users</div>
            </div>
        </div>
    </div>

    <div id="adminUsersGrid" class="admin-user-grid">
        <article class="admin-user-card admin-card" th:each="u : ${users}">
            <div class="admin-user-top">
                <img th:src="${u.profilePhotoPath != null ? u.profilePhotoPath : '/img/profile/default-user.svg'}"
                     alt="User photo" class="admin-user-photo">
                <div>
                    <h3 th:text="${u.fullName}">User name</h3>
                    <p th:text="${u.email}">user@email.com</p>
                    <span class="badge"
                          th:classappend="${u.active == null || u.active} ? ' text-bg-success' : ' text-bg-secondary'"
                          th:text="${u.active == null || u.active} ? 'Active' : 'Deactivated'">Active</span>
                </div>
            </div>
            <div class="admin-user-actions">
                <button class="btn btn-sm btn-outline-warning js-view-user" th:attr="data-id=${u.id}">View details</button>
            </div>
        </article>
    </div>

    <div class="admin-card p-5 text-center" id="adminUsersEmptyState" th:style="${#lists.isEmpty(users)} ? '' : 'display:none;'">
        <p class="mb-0 fs-5 text-light">No users found.</p>
    </div>

    <div class="modal fade" id="adminUserDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content admin-user-modal">
                <div class="modal-header admin-user-modal-header">
                    <div class="admin-user-modal-title-wrap">
                        <h5 class="modal-title mb-0"><i class="fa-solid fa-id-badge me-2"></i><span id="adminDetailTitleText">User details</span></h5>
                        <button id="adminDetailBackBtn" type="button" class="btn btn-outline-light btn-sm d-none">
                            <i class="fa-solid fa-arrow-left me-1"></i>Back
                        </button>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="admin-detail-head mb-4">
                        <img id="adminDetailPhoto" src="/img/profile/default-user.svg" alt="User photo" class="admin-detail-photo">
                        <div>
                            <h4 id="adminDetailName" class="mb-1">—</h4>
                            <p id="adminDetailEmail" class="mb-0">—</p>
                            <span id="adminDetailStatus" class="badge mt-2">—</span>
                        </div>
                    </div>

                    <form id="adminUserEditForm" class="row g-3">
                        <div class="col-12 col-md-6">
                            <label for="adminEditFullName" class="form-label text-light">Full name</label>
                            <input id="adminEditFullName" type="text" class="form-control form-control-admin" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="adminEditEmail" class="form-label text-light">Email</label>
                            <input id="adminEditEmail" type="text" class="form-control form-control-admin" disabled>
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="adminEditCity" class="form-label text-light">City</label>
                            <input id="adminEditCity" type="text" class="form-control form-control-admin">
                        </div>
                        <div class="col-12 col-md-6">
                            <label for="adminEditPhone" class="form-label text-light">Phone</label>
                            <input id="adminEditPhone" type="text" class="form-control form-control-admin">
                        </div>
                        <div class="col-12">
                            <div id="adminDetailExtra" class="admin-detail-extra"></div>
                        </div>
                    </form>
                    <p id="adminUserActionMsg" class="small mt-3 mb-0"></p>
                </div>
                <div class="modal-footer">
                    <button id="adminSaveUserBtn" type="button" class="btn btn-warning">Save changes</button>
                    <button id="adminToggleActiveBtn" type="button" class="btn btn-outline-light">Deactivate</button>
                    <button id="adminDeleteUserBtn" type="button" class="btn btn-danger">Delete user</button>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/admin/users.js}"></script>
</section>
</body>
</html>

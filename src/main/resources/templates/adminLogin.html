<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - RapidQuake</title>
</head>

<body>
  <section class="container-fluid p-0">
    <div class="admin-login-section d-flex justify-content-center align-items-center min-vh-100" style="padding-top: 100px;">
      <div class="admin-login-overlay"></div>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-4">
            <div class="card admin-login-card border-0 shadow-lg">
              <div class="card-body p-5">
                <!-- Title -->
                <div class="text-center mb-4">
                  <div class="admin-login-icon mb-3">
                    <i class="fas fa-user-shield fa-3x" style="color: #ffc107;"></i>
                  </div>
                  <h2 class="fw-bold text-dark">Admin Login</h2>
                  <p class="text-muted">Access the admin dashboard securely</p>
                </div>

                <!-- Admin Login Form -->
                <form th:action="@{/admin/login}" method="post">

                  <!-- Alert Messages -->
                  <div th:if="${param.error}" class="alert alert-danger text-center" role="alert">
                    Invalid admin credentials. Please try again.
                  </div>
                  <div th:if="${param.logout}" class="alert alert-success text-center" role="alert">
                    You have been logged out successfully.
                  </div>

                  <!-- Username -->
                  <div class="mb-3">
                    <label for="username" class="form-label text-dark">Admin Username</label>
                    <input type="text" class="form-control form-control-admin" id="username" name="username"
                           placeholder="Enter your admin username" required autocomplete="username">
                  </div>

                  <!-- Password -->
                  <div class="mb-3">
                    <label for="password" class="form-label text-dark">Password</label>
                    <input type="password" class="form-control form-control-admin" id="password" name="password"
                           placeholder="Enter your password" required autocomplete="current-password">
                  </div>

                  <!-- CSRF Token (safe check) -->
                  <div th:if="${_csrf != null}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  </div>

                  <!-- Submit Button -->
                  <button type="submit" class="btn btn-dark w-100 fw-bold" style="background: linear-gradient(135deg, #ffc107, #ff8c00) !important; border: none;">Login</button>
                </form>

                <!-- Extra Links -->
                <div class="text-center mt-3">
                  <a href="/" th:href="@{/}" class="text-decoration-none text-warning">← Back to Home</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>

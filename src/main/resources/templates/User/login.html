<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RapidQuake</title>
</head>

<body>
<section class="container-fluid p-0">
    <link rel="stylesheet" th:href="@{/css/User/auth.css}">

    <div class="admin-login-section d-flex align-items-center justify-content-center min-vh-100" style="padding-top: 100px;">
        <div class="admin-login-overlay"></div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card admin-login-card border-0 shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="admin-login-icon mb-3">
                                    <i class="fas fa-globe-americas fa-3x" style="color: #ffc107;"></i>
                                </div>
                                <h2 class="fw-bold text-dark mb-2">Welcome back</h2>
                                <p class="text-muted">Sign in to open your profile, live map, and safety features</p>
                            </div>

                            <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i>Invalid email or password.
                            </div>
                            <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
                                <i class="fas fa-check-circle me-2"></i>You have been logged out.
                            </div>
                            <div th:if="${message}" class="alert alert-info mb-3" role="alert">
                                <span th:text="${message}">Message</span>
                            </div>

                            <form th:action="@{/login}" method="post" class="login-form">
                                <div class="mb-3">
                                    <label for="email" class="form-label text-dark">
                                        <i class="fas fa-envelope me-2"></i>Email
                                    </label>
                                    <input type="email" class="form-control form-control-admin" id="email"
                                           name="email" placeholder="you@example.com" required autocomplete="username">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label text-dark">
                                        <i class="fas fa-lock me-2"></i>Password
                                    </label>
                                    <input type="password" class="form-control form-control-admin" id="password"
                                           name="password" placeholder="Password" required autocomplete="current-password">
                                </div>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-dark btn-lg w-100 mb-3 fw-bold"
                                        style="background: linear-gradient(135deg, #ffc107, #ff8c00) !important; border: none;">
                                    <i class="fas fa-sign-in-alt me-2"></i>Sign in
                                </button>
                                <div class="text-center">
                                    <span class="text-muted">No account? </span>
                                    <a th:href="@{/register}" class="text-warning text-decoration-none fw-bold">Register</a>
                                </div>
                            </form>

                            <div class="text-center mt-3">
                                <a th:href="@{/admin/login}" class="text-muted text-decoration-none">
                                    <i class="fas fa-user-shield me-2"></i>Staff login
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>

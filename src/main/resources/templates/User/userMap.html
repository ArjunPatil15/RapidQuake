<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - RapidQuake</title>
</head>

<body>
<section class="container-fluid p-0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/User/userMap.css}">

    <div class="map-page-wrapper">
        <div class="map-container">
            <div class="info-bar">
                <div class="info-grid">
                    <div class="info-item">
                        <span class="status-indicator" aria-hidden="true"></span>
                        <span id="user-location-status" class="info-text">Requesting location…</span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
                        <span class="info-text">Admin cannot view your live location unless you are trapped.</span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-burst" aria-hidden="true"></i>
                        <span id="earthquake-count" class="info-text">Loading…</span>
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-clock" aria-hidden="true"></i>
                        <span id="last-update" class="info-text">—</span>
                    </div>
                </div>
            </div>

            <div id="map" role="application" aria-label="Earthquake map"></div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Loading earthquake data…</p>
            </div>

            <div class="controls">
                <button type="button" class="control-btn zoom-btn" onclick="zoomInMap()" title="Zoom in">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button type="button" class="control-btn zoom-btn" onclick="zoomOutMap()" title="Zoom out">
                    <i class="fa-solid fa-minus"></i>
                </button>
                <button type="button" class="control-btn manual-btn" onclick="manualLocation()" title="Enter coordinates manually">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>
                <button type="button" class="control-btn retry-btn" onclick="retryLocation()" title="Retry GPS">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
                <button type="button" class="control-btn" onclick="goToUserLocation()" title="Center on your location">
                    <i class="fa-solid fa-crosshairs"></i>
                </button>
            </div>

            <div class="legend">
                <h3><i class="fa-solid fa-circle-info me-2"></i>Magnitude</h3>
                <div class="legend-item">
                    <span class="legend-circle" style="width:14px;height:14px;background:#8B0000;border-color:#8B0000;"></span>
                    <span>8+ Great</span>
                </div>
                <div class="legend-item">
                    <span class="legend-circle" style="width:12px;height:12px;background:#DC143C;border-color:#DC143C;"></span>
                    <span>7–7.9 Major</span>
                </div>
                <div class="legend-item">
                    <span class="legend-circle" style="width:11px;height:11px;background:#FF6347;border-color:#FF6347;"></span>
                    <span>6–6.9 Strong</span>
                </div>
                <div class="legend-item">
                    <span class="legend-circle" style="width:10px;height:10px;background:#FFA500;border-color:#FFA500;"></span>
                    <span>5–5.9 Moderate</span>
                </div>
                <div class="legend-item">
                    <span class="legend-circle" style="width:9px;height:9px;background:#FFD700;border-color:#FFD700;"></span>
                    <span>4–4.9 Light</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
    <script th:src="@{/js/User/userMap.js}"></script>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::Layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit profile - RapidQuake</title>
</head>

<body>
<section class="rq-profile-page rq-profile-edit container-xl px-3 px-md-4">
    <link rel="stylesheet" th:href="@{/css/User/profile-page.css}">

    <div th:if="${error}" class="alert rq-alert-rq alert-danger" role="alert" th:text="${error}"></div>

    <div class="rq-profile-hero mb-4">
        <div class="rq-profile-hero-inner">
            <div class="flex-grow-1">
                <h1 class="mb-2">Edit profile</h1>
                <p class="rq-muted-block mb-0" style="max-width: 42rem;">
                    Update how you appear in RapidQuake. Your email stays the same because it is your sign-in.
                    To delete your account, use the menu on your photo in the top navigation.
                </p>
            </div>
        </div>
    </div>

    <div class="rq-glass-card rq-profile-edit-card">
        <form th:action="@{/profile/edit}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="rq-form-grid">
                <div class="mb-4">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:value="${user.email}" disabled>
                </div>
                <div class="mb-4">
                    <label for="fullName" class="form-label">Full name</label>
                    <input type="text" class="form-control" id="fullName" name="fullName"
                           th:value="${user.fullName}" required minlength="2">
                </div>
                <div class="mb-4">
                    <label for="city" class="form-label">City / region</label>
                    <input type="text" class="form-control" id="city" name="city" th:value="${user.city}"
                           placeholder="e.g. Mumbai">
                </div>
                <div class="mb-4">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="text" class="form-control" id="phone" name="phone" th:value="${user.phone}"
                           placeholder="For emergency contact">
                </div>
            </div>

            <h2 class="h5 mt-2 mb-3">
                Change password <span class="text-secondary fw-normal fs-6">(optional)</span>
            </h2>
            <div class="rq-form-grid">
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New password</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                           minlength="8" autocomplete="new-password" placeholder="Leave blank to keep current password">
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label">Confirm new password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           minlength="8" autocomplete="new-password">
                </div>
            </div>

            <h2 class="h5 mt-4 mb-3">Profile photo</h2>
            <div class="mb-3" th:if="${user.profilePhotoPath != null}">
                <img th:src="${user.profilePhotoPath}" alt="" class="rounded mb-3 border border-secondary" style="max-height: 140px;">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="removePhoto" value="on" id="removePhoto">
                    <label class="form-check-label" for="removePhoto">Remove current photo</label>
                </div>
            </div>
            <div class="mb-4">
                <label for="photo" class="form-label">Upload or replace photo</label>
                <input type="file" class="form-control" id="photo" name="photo" accept="image/*">
            </div>

            <div class="d-flex flex-wrap gap-3 pt-2">
                <button type="submit" class="btn btn-warning btn-lg fw-bold px-5">
                    <i class="fa-solid fa-check me-2"></i>Save changes
                </button>
                <a th:href="@{/profile}" class="btn btn-outline-light btn-lg px-4">Cancel</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>

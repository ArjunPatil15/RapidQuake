# Tests use in-memory H2 so `mvn test` works without MySQL running

spring.flyway.enabled=false

spring.datasource.url=jdbc:h2:mem:rapidquaketest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

rapidquake.admin.email=admin@rapidquake.local
rapidquake.admin.password=admin123
rapidquake.seed.admin.enabled=true
